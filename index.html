              "name": "Why isn't outbound working anymore?",

                "@type": "Answer",
                "text": "Buyers are drowning in generic sequences while spam filters get smarter. The volume game worked when competition was lower, and it doesn't work in 2026. The fix isn't more outreach, it's better timing. Signal-based pipeline monitors behavioral triggers like job changes, funding events, hiring bursts, and tech installs. When a signal fires, the outreach goes out at the moment of relevance, not by accident. ERA builds these systems for mid-market B2B companies and runs them continuously."

              "@type": "Question",
              "name": "What is the difference between a campaign and a loop?",
              "acceptedAnswer": {
                "@type": "Answer",

              }
